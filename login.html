<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Obfuscator.io</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-shield-alt"></i>
                <h2>مرحباً بعودتك</h2>
                <p>سجل الدخول للمتابعة</p>
            </div>
            
            <button class="auth-btn github" id="githubLoginBtn">
                <i class="fab fa-github"></i>
                تسجيل الدخول مع GitHub
            </button>
            
            <div class="auth-divider">أو تسجيل الدخول عبر البريد الإلكتروني</div>
            
            <form id="loginForm">
                <div class="input-group">
                    <label>بريد إلكتروني</label>
                    <input type="email" id="loginEmail" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="loginPassword" placeholder="كلمة مرورك" required>
                </div>
                <div class="auth-links">
                    <a href="forgot.html">هل نسيت كلمة السر؟</a>
                </div>
                <button type="submit" class="auth-submit">تسجيل الدخول</button>
            </form>
            
            <div class="auth-footer">
                ليس لديك حساب؟ <a href="signup.html">سجل الآن</a>
            </div>
        </div>
    </div>
    
    <script>
        // تسجيل الدخول العادي
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault()
            
            const email = document.getElementById('loginEmail').value
            const password = document.getElementById('loginPassword').value
            
            const response = await fetch('/api/auth?action=login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            })
            
            const data = await response.json()
            
            if (data.success) {
                localStorage.setItem('token', data.token)
                localStorage.setItem('user', JSON.stringify(data.user))
                window.location.href = 'dashboard.html'
            } else {
                alert('❌ ' + data.error)
            }
        })
        
        // تسجيل الدخول بـ GitHub
        document.getElementById('githubLoginBtn').addEventListener('click', () => {
            window.location.href = '/api/github?action=login'
        })
    </script>
</body>
</html>
