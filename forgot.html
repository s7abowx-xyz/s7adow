<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نسيت كلمة السر - Obfuscator.io</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-key"></i>
                <h2>نسيت كلمة السر؟</h2>
                <p>أدخل بريدك الإلكتروني وسنرسل لك رمز إعادة التعيين.</p>
            </div>
            
            <form id="forgotForm">
                <div class="input-group">
                    <label>بريد إلكتروني</label>
                    <input type="email" placeholder="you@example.com" required>
                </div>
                <button type="submit" class="auth-submit">أرسل رمز إعادة الضبط</button>
            </form>
            
            <div class="auth-footer">
                <a href="login.html">← العودة إلى صفحة تسجيل الدخول</a>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
