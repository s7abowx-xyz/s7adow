<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - Obfuscator.io</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-shield-alt"></i>
                <h2>إنشاء حساب</h2>
                <p>سجل حسابك للمتابعة</p>
            </div>
            
            <button class="auth-btn github" id="githubSignupBtn">
                <i class="fab fa-github"></i>
                التسجيل مع GitHub
            </button>
            
            <div class="auth-divider">أو سجل باستخدام البريد الإلكتروني</div>
            
            <form id="signupForm">
                <div class="input-group">
                    <label>الاسم الكامل</label>
                    <input type="text" id="signupName" placeholder="جون دو" required>
                </div>
                <div class="input-group">
                    <label>ما الغرض من استخدام الخدمة</label>
                    <select id="signupPurpose">
                        <option value="personal">تطوير شخصي</option>
                        <option value="business">شركة / فريق</option>
                        <option value="student">طالب</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>بريد إلكتروني</label>
                    <input type="email" id="signupEmail" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="signupPassword" placeholder="أنشئ كلمة مرور" required>
                </div>
                <label class="checkbox">
                    <input type="checkbox" id="newsletter"> أرسل لي تحديثات المنتجات ونصائح (يمكنك إلغاء الاشتراك في أي وقت)
                </label>
                <button type="submit" class="auth-submit">إنشاء حساب</button>
            </form>
            
            <div class="auth-footer">
                بالتسجيل، فإنك توافق على <a href="terms.html">شروط الخدمة</a> و <a href="#">سياسة الخصوصية</a>
            </div>
        </div>
    </div>
    
    <script>
        // التسجيل العادي
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault()
            
            const name = document.getElementById('signupName').value
            const email = document.getElementById('signupEmail').value
            const password = document.getElementById('signupPassword').value
            const purpose = document.getElementById('signupPurpose').value
            
            const response = await fetch('/api/auth?action=register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password, purpose })
            })
            
            const data = await response.json()
            
            if (data.success) {
                alert('✅ تم إنشاء الحساب بنجاح! يمكنك الآن تسجيل الدخول.')
                window.location.href = 'login.html'
            } else {
                alert('❌ ' + data.error)
            }
        })
        
        // التسجيل بـ GitHub
        document.getElementById('githubSignupBtn').addEventListener('click', () => {
            window.location.href = '/api/github?action=login'
        })
    </script>
</body>
</html>
