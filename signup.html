<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - Obfuscator.io</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-shield-alt"></i>
                <h2>إنشاء حساب</h2>
                <p>سجل الدخول هل لديك حساب بالفعل؟</p>
            </div>
            
            <button class="auth-btn github">
                <i class="fab fa-github"></i>
                تأيض مع GitHub
            </button>
            
            <div class="auth-divider">أو سجل باستخدام البريد الإلكتروني</div>
            
            <form id="signupForm">
                <div class="input-group">
                    <label>الاسم الكامل</label>
                    <input type="text" placeholder="جون دو" required>
                </div>
                <div class="input-group">
                    <label>ما الغرض من استخدام التمويل</label>
                    <select>
                        <option>حدد حالة الاستخدام</option>
                        <option>تطوير شخصي</option>
                        <option>شركة / فريق</option>
                        <option>طلابي</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>بريد إلكتروني</label>
                    <input type="email" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <label>كلمة المرور</label>
                    <input type="password" placeholder="أنشئ كلمة مرور" required>
                </div>
                <label class="checkbox">
                    <input type="checkbox"> أرسل لي تحديثات المنتجات ونصائح (يمكنك إلغاء الاشتراك في أي وقت)
                </label>
                <button type="submit" class="auth-submit">إنشاء حساب</button>
            </form>
            
            <div class="auth-footer">
                بالتسجيل، فإنك توافق على <a href="terms.html">شروط الخدمة</a> و <a href="#">سياسة الخصوصية</a>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
