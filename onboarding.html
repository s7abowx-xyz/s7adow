<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الجولة التعريفية - Obfuscator.io</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="onboarding-page">
    <div class="onboarding-container">
        <div class="onboarding-card">
            <div class="onboarding-header">
                <i class="fas fa-rocket"></i>
                <h2>أهلاً بكم في Obfuscator.io!</h2>
                <p>لنقم بجولة سريعة لمساعدتك على البدء في حماية كود جافا سكريبت الخاص بك.</p>
            </div>
            
            <div class="onboarding-progress">
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 11%"></div>
                </div>
                <span>9 من 11</span>
            </div>
            
            <div class="onboarding-buttons">
                <button class="btn-secondary">خلف</button>
                <button class="btn-secondary">يتخطى</button>
                <button class="btn-primary" onclick="window.location.href='index.html'">التالي</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
